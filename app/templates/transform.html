<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">

<title>Fluxion AI Data Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>
<body class="bg-light">
<div class="container py-5">
<div class="card shadow">
<div class="card-header bg-primary text-white">
<h4 class="mb-0">🤖 Fluxion AI Data Assistant</h4>
</div>


<div class="card-body">
<!-- CHAT WINDOW -->
<div id="chatBox" class="chat-box mb-3">

<!-- first bot message -->
<div class="bot">
Hello 👋  
I will help you transform your dataset.

- rename column name to full_name  
- drop duplicate rows  
- drop duplicate columns  
- fill nulls with 0  
- drop rows with null  
When finished, click Download CSV.
</div>
</div>


<!-- USER INPUT -->
<div class="input-group mb-3">

<input
type="text"
id="chatInput"
class="form-control"
placeholder="Type transformation command...">

<button
class="btn btn-primary"
onclick="sendMessage()">
Send
</button>
</div>



<!-- DOWNLOAD BUTTON -->
<div class="text-end">
<button
class="btn btn-success btn-lg">

Download CSV

</button>
</div>


</div>

</div>

</div>



<script>

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("chatInput");

function addUser(text){

chatBox.innerHTML +=
`<div class="user">${text}</div>`;

chatBox.scrollTop = chatBox.scrollHeight;

}

function sendMessage(){

const msg=input.value.trim();

if(!msg) return;

addUser(msg);

input.value="";

}

</script>

</body>

</html>
