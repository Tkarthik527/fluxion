<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Fluxion – Upload CSV</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">

    <!-- Custom CSS (contains the .top-notch-card rule) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

<div class="container py-5 d-flex justify-content-center">
    <section class="card top-notch-card shadow-sm w-75">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">📂 Upload CSV File</h2>
        </div>

        <div class="card-body">
            <p class="lead text-muted mb-4">
                Choose a CSV file from your computer and click Next to continue.
            </p>

            <form action="{{ url_for('client.upload') }}" method="post"
                  enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="form-label" for="csvFile">CSV file</label>
                    <input class="form-control form-control-lg" type="file"
                           id="csvFile" name="csv_file" accept=".csv" required>
                </div>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">
                        Next →
                    </button>
                </div>
            </form>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-..." crossorigin="anonymous"></script>
</body>
</html>
