<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Fluxion – Step 3 – Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="mb-4">📊 Fluxion – Step 3: Preview Transformed Data</h1>

    <section class="card">
        <div class="card-body">
            <p><strong>First 5 rows after transformation:</strong></p>
            <pre id="previewBox" class="bg-white p-2 border rounded"
                 style="height:250px; overflow:auto;">Loading preview…</pre>

            <div class="d-flex justify-content-between mt-4">
                <a href="{{ url_for('client.transform') }}" class="btn btn-secondary">← Back</a>
                <button id="finishBtn" class="btn btn-success">Finish</button>
            </div>
        </div>
    </section>
</div>

<script>
    // -----------------------------------------------------------------
    // Pull the preview from the Flask endpoint when the page loads
    // -----------------------------------------------------------------
    async function loadPreview() {
        try {
            const resp = await fetch("{{ url_for('client.preview_data') }}");
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || "preview failed");
            document.getElementById("previewBox").textContent = data.preview;
        } catch (e) {
            document.getElementById("previewBox").textContent = "Error: " + e.message;
        }
    }

    document.addEventListener("DOMContentLoaded", loadPreview);

    // Simple finish handler – replace with real “run pipeline” later
    document.getElementById("finishBtn").addEventListener("click", () => {
        alert("Pipeline defined! You can now store it, schedule it, …");
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-..." crossorigin="anonymous"></script>
</body>
</html>
